<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" preserveAspectRatio="xMidYMid slice">
  <!-- Blue background like standard ISA sign -->
  <rect width="856" height="540" fill="#2B5CB8" rx="0"/>

  <!-- ISA Wheelchair symbol (centered left side) -->
  <g transform="translate(200, 50) scale(2.2)">
    <!-- Head -->
    <circle cx="80" cy="28" r="18" fill="white"/>
    <!-- Body / torso leaning forward -->
    <path d="M80 46 L80 110 L55 145" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Upper arm forward -->
    <path d="M80 78 L118 95" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Seat -->
    <path d="M80 110 L128 110" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Big wheel -->
    <circle cx="118" cy="155" r="48" fill="none" stroke="white" stroke-width="14"/>
    <!-- Small front wheel -->
    <circle cx="50" cy="158" r="18" fill="none" stroke="white" stroke-width="11"/>
    <!-- Wheel hub dot -->
    <circle cx="118" cy="155" r="7" fill="white"/>
  </g>

  <!-- תעודת נכה text (right side) -->
  <text x="590" y="230"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="80"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        direction="rtl">תעודת</text>
  <text x="590" y="330"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="80"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        direction="rtl">נכה</text>
  <text x="590" y="400"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="38"
        font-weight="400"
        fill="white"
        fill-opacity="0.85"
        text-anchor="middle">Disability Card</text>
</svg>
