<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="queueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8B8E8"/>
      <stop offset="60%" stop-color="#DDD0F5"/>
      <stop offset="100%" stop-color="#F0EAF8"/>
    </linearGradient>
  </defs>

  <!-- Lavender background like real card -->
  <rect width="856" height="540" fill="url(#queueGrad)"/>

  <!-- ISA symbol (small, top left) -->
  <g transform="translate(68, 48) scale(0.9)">
    <circle cx="50" cy="22" r="20" fill="#1B5C6E"/>
    <path d="M50 42 L50 95 L32 118" stroke="#1B5C6E" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M50 65 L80 78" stroke="#1B5C6E" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M50 95 L88 95" stroke="#1B5C6E" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="80" cy="128" r="36" fill="none" stroke="#1B5C6E" stroke-width="12"/>
    <circle cx="28" cy="130" r="14" fill="none" stroke="#1B5C6E" stroke-width="9"/>
  </g>

  <!-- "תעודת נכה" title -->
  <text x="560" y="110"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="82"
        font-weight="900"
        fill="#1B3A52"
        text-anchor="middle"
        direction="rtl">תעודת נכה</text>

  <!-- "Disability Card" subtitle -->
  <text x="560" y="168"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="42"
        font-weight="600"
        fill="#1B5C6E"
        text-anchor="middle">Disability Card</text>

  <!-- Dark teal banner for פטור מתור -->
  <rect x="60" y="210" width="736" height="72" rx="8" fill="#1B5C6E"/>
  <text x="428" y="258"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="38"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        direction="rtl">פטור מתור ופטור מתשלום עבור מלווה</text>

  <!-- Bottom label -->
  <text x="428" y="460"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="44"
        font-weight="800"
        fill="#2D1B6B"
        text-anchor="middle"
        direction="rtl">פטור מתור</text>
</svg>
