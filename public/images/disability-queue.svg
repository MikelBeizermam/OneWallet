<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="queueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065F46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>
  <rect width="856" height="540" fill="url(#queueGrad)"/>

  <!-- Star / priority badge -->
  <circle cx="290" cy="270" r="130" fill="white" fill-opacity="0.15"/>
  <circle cx="290" cy="270" r="100" fill="none" stroke="white" stroke-width="12"/>

  <!-- Number 1 inside circle -->
  <text x="290" y="320"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="130"
        font-weight="900"
        fill="white"
        text-anchor="middle">1</text>

  <!-- פטור מתור text -->
  <text x="610" y="265"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="86"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        direction="rtl">פטור</text>
  <text x="610" y="365"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-size="86"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        direction="rtl">מתור</text>
</svg>
