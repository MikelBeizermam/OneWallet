<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" preserveAspectRatio="xMidYMid slice">
  <!-- Amber/yellow background -->
  <rect width="856" height="540" fill="#F5A623"/>

  <!-- ═══ BIRD (white silhouette with dark feather lines) ═══ -->

  <!-- Main body (white, elongated, tilted) -->
  <path d="
    M 158,298
    C 194,268 278,247 382,241
    C 448,237 506,232 550,216
    C 576,206 602,190 626,170
    L 616,183
    C 592,201 566,218 536,230
    C 494,246 440,254 382,260
    C 274,272 188,294 158,322
    Z
  " fill="white"/>

  <!-- Large wing (white, swept upward-back) -->
  <path d="
    M 296,248
    C 308,196 345,152 412,136
    C 455,125 498,138 525,160
    L 508,170
    C 482,153 450,146 415,158
    C 360,177 326,220 296,248
    Z
  " fill="white"/>

  <!-- Wing feather lines (dark diagonal strokes) -->
  <line x1="332" y1="242" x2="372" y2="154" stroke="#1a1a1a" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="356" y1="236" x2="394" y2="148" stroke="#1a1a1a" stroke-width="5"   stroke-linecap="round"/>
  <line x1="378" y1="228" x2="413" y2="145" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="400" y1="217" x2="432" y2="145" stroke="#1a1a1a" stroke-width="4"   stroke-linecap="round"/>
  <line x1="420" y1="205" x2="450" y2="150" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="438" y1="192" x2="465" y2="156" stroke="#1a1a1a" stroke-width="3"   stroke-linecap="round"/>

  <!-- Tail feathers -->
  <path d="M 162,302 C 128,290 105,308 100,330 C 118,322 144,310 162,302 Z" fill="white"/>

  <!-- Neck -->
  <path d="
    M 626,170
    C 643,156 662,142 682,131
    L 687,140
    C 667,150 647,164 626,182
    Z
  " fill="white"/>

  <!-- Head -->
  <circle cx="688" cy="126" r="34" fill="white"/>

  <!-- Long beak -->
  <path d="M 714,117 L 782,97 L 714,143 Z" fill="white"/>
  <!-- Beak dividing line -->
  <line x1="714" y1="130" x2="782" y2="120" stroke="#E8951F" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eye dot -->
  <circle cx="700" cy="120" r="5" fill="#1a1a1a"/>

  <!-- Leg -->
  <line x1="285" y1="265" x2="264" y2="328" stroke="white" stroke-width="9"  stroke-linecap="round"/>
  <line x1="264" y1="328" x2="238" y2="344" stroke="white" stroke-width="7"  stroke-linecap="round"/>
  <line x1="264" y1="328" x2="279" y2="346" stroke="white" stroke-width="7"  stroke-linecap="round"/>

  <!-- Gift box (carried below bird) -->
  <rect x="244" y="276" width="44" height="36" rx="4" fill="white"/>
  <!-- Ribbon cross -->
  <line x1="266" y1="276" x2="266" y2="312" stroke="#F5A623" stroke-width="3"/>
  <line x1="244" y1="294" x2="288" y2="294" stroke="#F5A623" stroke-width="3"/>
  <!-- Bow loops -->
  <path d="M266,276 Q259,267 253,271 Q248,277 266,276 Z" fill="#F5A623"/>
  <path d="M266,276 Q273,267 279,271 Q284,277 266,276 Z" fill="#F5A623"/>

  <!-- ═══ TEXT ═══ -->
  <text x="428" y="414"
        text-anchor="middle"
        font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
        font-size="90"
        font-weight="900"
        fill="white">BUYME</text>

  <text x="428" y="462"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        fill="white"
        opacity="0.9">פשוט לתת מתנות</text>
</svg>
