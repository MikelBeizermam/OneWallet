<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" preserveAspectRatio="xMidYMid slice">
  <!-- Warm amber/yellow background -->
  <rect width="856" height="540" fill="#F5A623"/>

  <!-- Simplified stork silhouette (BuyMe bird) -->
  <!-- Body -->
  <ellipse cx="390" cy="255" rx="135" ry="48" transform="rotate(-18, 390, 255)" fill="#1A1A1A"/>
  <!-- Wing upper -->
  <path d="M 330,210 Q 380,145 470,165 Q 430,200 330,210 Z" fill="#1A1A1A"/>
  <!-- Wing lower tip -->
  <path d="M 240,240 Q 200,210 260,188 Q 285,220 240,240 Z" fill="#1A1A1A"/>
  <!-- Neck -->
  <path d="M 480,210 Q 510,185 530,160 Q 520,155 498,178 Q 472,205 480,210 Z" fill="#1A1A1A"/>
  <!-- Head -->
  <ellipse cx="536" cy="152" rx="28" ry="26" fill="#1A1A1A"/>
  <!-- Long beak -->
  <path d="M 552,146 L 615,128 L 552,162 Z" fill="#1A1A1A"/>
  <!-- Leg -->
  <line x1="350" y1="290" x2="335" y2="340" stroke="#1A1A1A" stroke-width="9" stroke-linecap="round"/>
  <line x1="335" y1="340" x2="310" y2="352" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
  <line x1="335" y1="340" x2="352" y2="355" stroke="#1A1A1A" stroke-width="7" stroke-linecap="round"/>
  <!-- Small package held by bird -->
  <rect x="288" y="270" width="46" height="36" rx="4" fill="#1A1A1A"/>
  <line x1="311" y1="270" x2="311" y2="306" stroke="#F5A623" stroke-width="3"/>
  <line x1="288" y1="288" x2="334" y2="288" stroke="#F5A623" stroke-width="3"/>

  <!-- BUYME text -->
  <text x="428" y="415"
        text-anchor="middle"
        font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif"
        font-size="95"
        font-weight="900"
        fill="white"
        letter-spacing="-2">BUYME</text>

  <!-- Hebrew subtitle -->
  <text x="428" y="468"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="32"
        fill="white"
        opacity="0.85">פשוט לתת מתנות</text>
</svg>
