<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="65%" r="42%">
      <stop offset="0%" stop-color="#7B1FCD" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#4A0F8A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#050010" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="856" height="540" fill="#080010"/>
  <!-- Purple glow centred lower -->
  <ellipse cx="428" cy="355" rx="300" ry="240" fill="url(#glow)"/>

  <!-- "Gift Card" title — smaller and moved down so it stays inside card -->
  <text x="428" y="128"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="58"
        fill="#C084FC"
        font-style="italic">Gift Card</text>

  <!-- Box lid -->
  <rect x="298" y="162" width="260" height="50" rx="8"
        fill="none" stroke="white" stroke-width="11"/>
  <!-- Box body -->
  <rect x="318" y="205" width="220" height="220" rx="8"
        fill="none" stroke="white" stroke-width="11"/>
  <!-- Vertical ribbon -->
  <line x1="428" y1="162" x2="428" y2="425"
        stroke="white" stroke-width="11"/>
  <!-- Horizontal ribbon on lid -->
  <line x1="318" y1="187" x2="538" y2="187"
        stroke="white" stroke-width="11"/>
  <!-- Bow left loop -->
  <path d="M428,162 Q394,112 370,126 Q348,142 428,162"
        fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Bow right loop -->
  <path d="M428,162 Q462,112 486,126 Q508,142 428,162"
        fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
</svg>
