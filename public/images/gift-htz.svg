<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 540" preserveAspectRatio="xMidYMid slice">
  <!-- Dark background -->
  <rect width="856" height="540" fill="#1E1E22"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="htzGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2A30" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111114" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="856" height="540" fill="url(#htzGrad)"/>

  <!-- "h" letter -->
  <text x="248" y="320"
        font-family="'Arial', sans-serif"
        font-size="210"
        font-weight="300"
        fill="white"
        text-anchor="middle">h</text>

  <!-- "t" letter with cross accent -->
  <text x="428" y="320"
        font-family="'Arial', sans-serif"
        font-size="210"
        font-weight="400"
        fill="white"
        text-anchor="middle">t</text>

  <!-- "z" letter -->
  <text x="608" y="320"
        font-family="'Arial', sans-serif"
        font-size="210"
        font-weight="300"
        fill="white"
        text-anchor="middle">z</text>

  <!-- Teal accent arc -->
  <path d="M 580 390 Q 680 430 760 385"
        fill="none"
        stroke="#00CDB8"
        stroke-width="14"
        stroke-linecap="round"/>
</svg>
